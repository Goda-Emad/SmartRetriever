# .streamlit/config.toml
# ⚙️ إعدادات تطبيق Streamlit

# ============================================================
# 🎨 إعدادات المظهر (Theme)
# ============================================================

[theme]
# الألوان الأساسية
primaryColor = "#2563EB"              # اللون الأساسي (أزرق)
backgroundColor = "#0F172A"           # لون الخلفية (أزرق غامق)
secondaryBackgroundColor = "#1E293B"  # لون الخلفية الثانوي
textColor = "#E2E8F0"                 # لون النص (أبيض مائل للرمادي)

# ✅ إعدادات الخطوط
font = "sans serif"                   # نوع الخط

# ✅ تخصيص الألوان الإضافية
[theme.custom]
headerColor = "#F8FAFC"               # ✅ لون العناوين الرئيسية (أبيض)
subheaderColor = "#94A3B8"            # ✅ لون العناوين الفرعية (رمادي فاتح)
linkColor = "#60A5FA"                 # ✅ لون الروابط (أزرق فاتح)

# ============================================================
# 🖥️ إعدادات الخادم (Server)
# ============================================================

[server]
# حجم الملفات المرفوعة (بالـ MB)
maxUploadSize = 20

# السماح بـ CORS
enableCORS = true

# حماية من هجمات CSRF
enableXsrfProtection = true

# ============================================================
# 🌐 إعدادات المتصفح (Browser)
# ============================================================

[browser]
# إيقاف جمع إحصائيات الاستخدام
gatherUsageStats = false

# ============================================================
# 🏃 إعدادات التشغيل (Runner)
# ============================================================

[runner]
# تمكين الـ Magic Commands (مثل st.write)
magicEnabled = true

# ============================================================
# 📝 إعدادات التسجيل (Logger)
# ============================================================

[logger]
# مستوى التسجيل: error, warning, info, debug
level = "info"

# ============================================================
# 🌍 إعدادات عامة (Global)
# ============================================================

[global]
# وضع التطوير (true/false)
developmentMode = false

# ============================================================
# 📊 إعدادات عرض البيانات (DataFrame)
# ============================================================

[dataFrame]
# عدد الصفوف المعروضة افتراضياً
defaultRows = 10

# ============================================================
# 🔧 إعدادات متقدمة
# ============================================================

# الحد الأقصى لحجم الرسالة (بالـ MB)
# maxMessageSize = 200

# مهلة الاتصال (بالثواني)
