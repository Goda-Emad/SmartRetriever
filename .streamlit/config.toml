# .streamlit/config.toml
# ⚙️ إعدادات تطبيق Streamlit

# ============================================================
# 🎨 إعدادات المظهر (Theme)
# ============================================================

[theme]
# الألوان الأساسية
primaryColor = "#2563EB"              # اللون الأساسي (أزرق)
backgroundColor = "#FFFFFF"           # لون الخلفية
secondaryBackgroundColor = "#F8FAFC"  # لون الخلفية الثانوي
textColor = "#1E293B"                 # لون النص
font = "sans serif"                   # نوع الخط

# ============================================================
# 🖥️ إعدادات الخادم (Server)
# ============================================================

[server]
# حجم الملفات المرفوعة (بالـ MB)
maxUploadSize = 20

# السماح بـ CORS
enableCORS = true

# حماية من هجمات CSRF
enableXsrfProtection = true

# ============================================================
# 🌐 إعدادات المتصفح (Browser)
# ============================================================

[browser]
# إيقاف جمع إحصائيات الاستخدام
gatherUsageStats = false

# ============================================================
# 🏃 إعدادات التشغيل (Runner)
# ============================================================

[runner]
# تمكين الـ Magic Commands (مثل st.write)
magicEnabled = true

# ============================================================
# 📝 إعدادات التسجيل (Logger)
# ============================================================

[logger]
# مستوى التسجيل: error, warning, info, debug
level = "info"

# ============================================================
# 🌍 إعدادات عامة (Global)
# ============================================================

[global]
# وضع التطوير (true/false)
developmentMode = false

# ============================================================
# 📊 إعدادات عرض البيانات (DataFrame)
# ============================================================

[dataFrame]
# عدد الصفوف المعروضة افتراضياً
defaultRows = 10

# ============================================================
# 🔧 إعدادات متقدمة
# ============================================================

# الحد الأقصى لحجم الرسالة (بالـ MB)
# maxMessageSize = 200

# مهلة الاتصال (بالثواني)
# server.maxMessageSize = 200
